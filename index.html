<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Business Analytics Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ========================================
   DESIGN SYSTEM & VARIABLES
   ======================================== */

:root {
    /* Colors */
    --color-bg: #0f172a;
    --color-surface: #1e293b;
    --color-surface-light: #334155;
    --color-primary: #3b82f6;
    --color-primary-dark: #1d4ed8;
    --color-primary-light: #60a5fa;
    --color-secondary: #6366f1;
    --color-secondary-dark: #4f46e5;
    --color-success: #22c55e;
    --color-success-light: #86efac;
    --color-warning: #f59e0b;
    --color-danger: #ef4444;
    --color-danger-light: #fca5a5;
    --color-text: #f8fafc;
    --color-text-secondary: #94a3b8;
    --color-text-tertiary: #64748b;
    --color-border: #334155;

    /* Gradients */
    --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
    --gradient-success: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    --gradient-danger: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);

    /* Spacing */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 12px;
    --space-lg: 16px;
    --space-xl: 24px;
    --space-2xl: 32px;
    --space-3xl: 48px;

    /* Typography */
    --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'Fira Code', monospace;
    --font-size-xs: 11px;
    --font-size-sm: 12px;
    --font-size-base: 14px;
    --font-size-md: 16px;
    --font-size-lg: 18px;
    --font-size-xl: 20px;
    --font-size-2xl: 24px;
    --font-size-3xl: 32px;
    --font-weight-regular: 400;
    --font-weight-medium: 500;
    --font-weight-semibold: 600;
    --font-weight-bold: 700;

    /* Border Radius */
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 16px;

    /* Shadows */
    --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    --shadow-glow: 0 0 24px 0 rgba(59, 130, 246, 0.15);

    /* Transitions */
    --transition-fast: 0.15s ease-in-out;
    --transition-base: 0.2s ease-in-out;
    --transition-slow: 0.3s ease-in-out;

    /* Z-index */
    --z-sidebar: 100;
    --z-topbar: 90;
    --z-dropdown: 200;
    --z-modal: 300;
    --z-toast: 400;
}

*,
*::before,
*::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    background-color: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-family);
    font-size: var(--font-size-base);
    line-height: 1.6;
    overflow: hidden;
}

button {
    font-family: var(--font-family);
    cursor: pointer;
    border: none;
    background: none;
}

a {
    color: inherit;
    text-decoration: none;
}



.app {
    display: flex;
    height: 100vh;
    background-color: var(--color-bg);
}



.sidebar {
    width: 240px;
    background: linear-gradient(180deg, var(--color-surface) 0%, #1a2332 100%);
    border-right: 1px solid var(--color-border);
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0;
    top: 0;
    height: 100vh;
    z-index: var(--z-sidebar);
    transition: transform var(--transition-base);
    overflow-y: auto;
    overflow-x: hidden;
}

.sidebar.collapsed {
    transform: translateX(-100%);
}

.sidebar-header {
    padding: var(--space-lg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-md);
    border-bottom: 1px solid var(--color-border);
}

.logo {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    font-weight: var(--font-weight-bold);
    font-size: var(--font-size-lg);
    background: var(--gradient-primary);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.sidebar-toggle {
    display: none;
    width: 32px;
    height: 32px;
    border-radius: var(--radius-md);
    color: var(--color-text-secondary);
    transition: all var(--transition-base);
}

.sidebar-toggle:hover {
    background: rgba(59, 130, 246, 0.1);
    color: var(--color-primary);
}


.nav-menu {
    flex: 1;
    padding: var(--space-lg) var(--space-sm);
    display: flex;
    flex-direction: column;
    gap: var(--space-sm);
}

.nav-item {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    padding: var(--space-md) var(--space-lg);
    border-radius: var(--radius-md);
    color: var(--color-text-secondary);
    font-weight: var(--font-weight-medium);
    font-size: var(--font-size-base);
    transition: all var(--transition-base);
    position: relative;
}

.nav-item:hover {
    background: rgba(59, 130, 246, 0.1);
    color: var(--color-primary);
}

.nav-item.active {
    background: rgba(59, 130, 246, 0.15);
    color: var(--color-primary);
    border-left: 3px solid var(--color-primary);
    padding-left: calc(var(--space-lg) - 3px);
}

.nav-item .icon {
    flex-shrink: 0;
}

/* Sidebar Footer */
.sidebar-footer {
    padding: var(--space-lg);
    border-top: 1px solid var(--color-border);
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
}

.user-info {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    padding: var(--space-md);
    border-radius: var(--radius-md);
    background: rgba(59, 130, 246, 0.05);
    cursor: pointer;
    transition: all var(--transition-base);
}

.user-info:hover {
    background: rgba(59, 130, 246, 0.1);
}

.user-meta {
    flex: 1;
    min-width: 0;
}

.user-name {
    font-weight: var(--font-weight-semibold);
    font-size: var(--font-size-base);
}

.user-email {
    font-size: var(--font-size-sm);
    color: var(--color-text-tertiary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.avatar-sm {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
}


.main-wrapper {
    flex: 1;
    margin-left: 240px;
    display: flex;
    flex-direction: column;
    transition: margin-left var(--transition-base);
    overflow: hidden;
}

.main-wrapper.sidebar-collapsed {
    margin-left: 0;
}



.topbar {
    height: 64px;
    background: linear-gradient(90deg, var(--color-surface) 0%, rgba(30, 41, 59, 0.8) 100%);
    border-bottom: 1px solid var(--color-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--space-xl);
    z-index: var(--z-topbar);
    position: sticky;
    top: 0;
}

.topbar-left {
    flex: 1;
}

.page-title {
    font-size: var(--font-size-2xl);
    font-weight: var(--font-weight-bold);
    color: var(--color-text);
    margin: 0;
}

.topbar-right {
    display: flex;
    align-items: center;
    gap: var(--space-xl);
}

/* Search Box */
.search-box {
    position: relative;
    width: 280px;
}

.search-icon {
    position: absolute;
    left: var(--space-lg);
    top: 50%;
    transform: translateY(-50%);
    color: var(--color-text-tertiary);
    pointer-events: none;
}

.search-input {
    width: 100%;
    padding: var(--space-md) var(--space-lg) var(--space-md) 36px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    font-size: var(--font-size-base);
    transition: all var(--transition-base);
}

.search-input::placeholder {
    color: var(--color-text-tertiary);
}

.search-input:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--color-primary);
}

.search-input:focus {
    outline: none;
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.icon-button {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-md);
    color: var(--color-text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: all var(--transition-base);
}

.icon-button:hover {
    background: rgba(59, 130, 246, 0.1);
    color: var(--color-primary);
}

.notification-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    background: var(--color-danger);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
}

.profile-dropdown {
    position: relative;
}

.profile-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--color-border);
    transition: all var(--transition-base);
}

.profile-btn:hover {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.avatar {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.dropdown-menu {
    position: absolute;
    top: calc(100% + var(--space-md));
    right: 0;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    min-width: 160px;
    box-shadow: var(--shadow-xl);
    display: none;
    flex-direction: column;
    z-index: var(--z-dropdown);
    animation: dropdownIn var(--transition-fast);
}

.dropdown-menu.visible {
    display: flex;
}

@keyframes dropdownIn {
    from {
        opacity: 0;
        transform: translateY(-8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.dropdown-item {
    padding: var(--space-md) var(--space-lg);
    color: var(--color-text-secondary);
    font-size: var(--font-size-base);
    transition: all var(--transition-base);
    display: block;
}

.dropdown-item:hover {
    background: rgba(59, 130, 246, 0.1);
    color: var(--color-primary);
}

.dropdown-item.logout {
    color: var(--color-danger);
}

.dropdown-item.logout:hover {
    background: rgba(239, 68, 68, 0.1);
}

.dropdown-divider {
    height: 1px;
    background: var(--color-border);
    border: none;
    margin: var(--space-sm) 0;
}



.page-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: var(--space-2xl);
}

.page-content::-webkit-scrollbar {
    width: 8px;
}

.page-content::-webkit-scrollbar-track {
    background: transparent;
}

.page-content::-webkit-scrollbar-thumb {
    background: var(--color-surface-light);
    border-radius: 4px;
}

.page-content::-webkit-scrollbar-thumb:hover {
    background: var(--color-border);
}



.kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: var(--space-xl);
    margin-bottom: var(--space-2xl);
}

.kpi-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-xl);
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
    transition: all var(--transition-base);
    position: relative;
    overflow: hidden;
}

.kpi-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--gradient-primary);
    opacity: 0;
    transition: opacity var(--transition-base);
}

.kpi-card:hover {
    border-color: var(--color-primary);
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.05) 0%, transparent 100%);
    box-shadow: var(--shadow-lg);
}

.kpi-card:hover::before {
    opacity: 1;
}

.kpi-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.kpi-label {
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
    font-weight: var(--font-weight-medium);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.kpi-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(59, 130, 246, 0.1);
    color: var(--color-primary);
}

.kpi-card.success .kpi-icon {
    background: rgba(34, 197, 94, 0.1);
    color: var(--color-success);
}

.kpi-card.warning .kpi-icon {
    background: rgba(245, 158, 11, 0.1);
    color: var(--color-warning);
}

.kpi-card.danger .kpi-icon {
    background: rgba(239, 68, 68, 0.1);
    color: var(--color-danger);
}

.kpi-value {
    font-size: var(--font-size-3xl);
    font-weight: var(--font-weight-bold);
    color: var(--color-text);
    line-height: 1;
}

.kpi-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.kpi-trend {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
}

.kpi-trend.positive {
    color: var(--color-success);
}

.kpi-trend.negative {
    color: var(--color-danger);
}

.trend-arrow {
    display: inline-block;
}

.kpi-sparkline {
    height: 28px;
    width: 100%;
}



.chart-container {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-xl);
    margin-bottom: var(--space-2xl);
}

.chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-xl);
}

.chart-title {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
}

.chart-controls {
    display: flex;
    gap: var(--space-sm);
}

.chart-period-btn {
    padding: 6px 12px;
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: var(--radius-sm);
    color: var(--color-text-secondary);
    font-size: var(--font-size-sm);
    transition: all var(--transition-base);
}

.chart-period-btn.active {
    background: var(--color-primary);
    border-color: var(--color-primary);
    color: white;
}

.chart-period-btn:hover {
    background: rgba(59, 130, 246, 0.2);
    border-color: var(--color-primary);
}

.chart-canvas {
    width: 100%;
    max-height: 300px;
}



.table-container {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: var(--space-2xl);
}

.table-header {
    padding: var(--space-lg) var(--space-xl);
    border-bottom: 1px solid var(--color-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.table-title {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
}

.table-filters {
    display: flex;
    gap: var(--space-md);
    flex-wrap: wrap;
}

.filter-select {
    padding: var(--space-md) var(--space-lg);
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    font-size: var(--font-size-base);
    cursor: pointer;
    transition: all var(--transition-base);
}

.filter-select:hover {
    border-color: var(--color-primary);
    background: rgba(59, 130, 246, 0.15);
}

.filter-select:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: rgba(59, 130, 246, 0.05);
}

th {
    padding: var(--space-lg) var(--space-xl);
    text-align: left;
    font-weight: var(--font-weight-semibold);
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--color-border);
    cursor: pointer;
    user-select: none;
    transition: all var(--transition-base);
}

th:hover {
    color: var(--color-primary);
}

td {
    padding: var(--space-lg) var(--space-xl);
    border-bottom: 1px solid var(--color-border);
    color: var(--color-text);
    font-size: var(--font-size-base);
}

tbody tr {
    transition: all var(--transition-base);
}

tbody tr:hover {
    background: rgba(59, 130, 246, 0.05);
}

tbody tr:last-child td {
    border-bottom: none;
}


.badge {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-semibold);
    text-transform: capitalize;
}

.badge.active {
    background: rgba(34, 197, 94, 0.15);
    color: var(--color-success);
}

.badge.inactive,
.badge.pending {
    background: rgba(245, 158, 11, 0.15);
    color: var(--color-warning);
}

.badge.completed,
.badge.success {
    background: rgba(34, 197, 94, 0.15);
    color: var(--color-success);
}

.badge.cancelled,
.badge.blocked {
    background: rgba(239, 68, 68, 0.15);
    color: var(--color-danger);
}

.action-buttons {
    display: flex;
    gap: var(--space-sm);
    justify-content: flex-end;
}

.btn-small {
    padding: 6px 12px;
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: var(--radius-sm);
    color: var(--color-primary);
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-semibold);
    cursor: pointer;
    transition: all var(--transition-base);
}

.btn-small:hover {
    background: var(--color-primary);
    color: white;
    border-color: var(--color-primary);
}

.btn-small.danger {
    color: var(--color-danger);
    border-color: rgba(239, 68, 68, 0.2);
    background: rgba(239, 68, 68, 0.1);
}

.btn-small.danger:hover {
    background: var(--color-danger);
    border-color: var(--color-danger);
    color: white;
}



.pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-sm);
    padding: var(--space-xl);
    border-top: 1px solid var(--color-border);
}

.pagination-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-md);
    border: 1px solid var(--color-border);
    background: transparent;
    color: var(--color-text-secondary);
    font-weight: var(--font-weight-medium);
    transition: all var(--transition-base);
}

.pagination-btn:hover:not(:disabled) {
    border-color: var(--color-primary);
    color: var(--color-primary);
    background: rgba(59, 130, 246, 0.1);
}

.pagination-btn.active {
    background: var(--color-primary);
    border-color: var(--color-primary);
    color: white;
}

.pagination-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.pagination-info {
    color: var(--color-text-secondary);
    font-size: var(--font-size-sm);
    margin: 0 var(--space-md);
}



.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-sm);
    padding: 10px 18px;
    border-radius: var(--radius-md);
    font-weight: var(--font-weight-semibold);
    font-size: var(--font-size-base);
    transition: all var(--transition-base);
    cursor: pointer;
}

.btn-primary {
    background: var(--gradient-primary);
    color: white;
    border: none;
}

.btn-primary:hover {
    box-shadow: var(--shadow-glow);
    transform: translateY(-2px);
}

.btn-secondary {
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid var(--color-primary);
    color: var(--color-primary);
}

.btn-secondary:hover {
    background: rgba(59, 130, 246, 0.15);
}

.btn-outline {
    background: transparent;
    border: 1px solid var(--color-border);
    color: var(--color-text);
}

.btn-outline:hover {
    border-color: var(--color-primary);
    color: var(--color-primary);

    <script >
        

class StorageManager {
    constructor(prefix = 'analytics_') {
        this.prefix = prefix;
        this.initializeDefaults();
    }

    initializeDefaults() {
        if (!this.get('settings')) {
            this.set('settings', {
                theme: 'dark',
                notifications: true,
                currency: 'USD',
            });
        }

        if (!this.get('users')) {
            this.set('users', this.generateMockUsers());
        }

        if (!this.get('orders')) {
            this.set('orders', this.generateMockOrders());
        }

        if (!this.get('analytics')) {
            this.set('analytics', this.generateMockAnalytics());
        }
    }

    set(key, value) {
        try {
            localStorage.setItem(
                `${this.prefix}${key}`,
                JSON.stringify(value)
            );
            return true;
        } catch (error) {
            console.error('Storage error:', error);
            return false;
        }
    }

    get(key, defaultValue = null) {
        try {
            const value = localStorage.getItem(`${this.prefix}${key}`);
            return value ? JSON.parse(value) : defaultValue;
        } catch (error) {
            console.error('Storage error:', error);
            return defaultValue;
        }
    }

    remove(key) {
        try {
            localStorage.removeItem(`${this.prefix}${key}`);
            return true;
        } catch (error) {
            console.error('Storage error:', error);
            return false;
        }
    }

    clear() {
        try {
            Object.keys(localStorage).forEach(key => {
                if (key.startsWith(this.prefix)) {
                    localStorage.removeItem(key);
                }
            });
            this.initializeDefaults();
            return true;
        } catch (error) {
            console.error('Storage error:', error);
            return false;
        }
    }

    generateMockUsers() {
        const firstNames = ['Alice', 'Bob', 'Charlie', 'Diana', 'Eve', 'Frank', 'Grace', 'Henry'];
        const lastNames = ['Smith', 'Johnson', 'Williams', 'Brown', 'Jones', 'Garcia', 'Miller', 'Davis'];
        const domains = ['gmail.com', 'yahoo.com', 'outlook.com', 'company.com', 'example.com'];

        return Array.from({ length: 28 }, (_, i) => ({
            id: `usr_${String(i + 1).padStart(4, '0')}`,
            name: `${firstNames[Math.floor(Math.random() * firstNames.length)]} ${lastNames[Math.floor(Math.random() * lastNames.length)]}`,
            email: `user${i + 1}@${domains[Math.floor(Math.random() * domains.length)]}`,
            role: Math.random() > 0.8 ? 'Admin' : 'User',
            status: Math.random() > 0.15 ? 'Active' : 'Inactive',
            joinedAt: new Date(Date.now() - Math.random() * 365 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
            lastActive: new Date(Date.now() - Math.random() * 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
        }));
    }

    generateMockOrders() {
        const statuses = ['Completed', 'Pending', 'Cancelled'];
        const products = ['Pro Plan', 'Basic Plan', 'Enterprise Plan', 'API Access', 'Support Package'];

        return Array.from({ length: 45 }, (_, i) => ({
            id: `ord_${String(i + 1).padStart(5, '0')}`,
            customer: `Customer ${i + 1}`,
            email: `customer${i + 1}@example.com`,
            product: products[Math.floor(Math.random() * products.length)],
            amount: Math.floor(Math.random() * 10000) + 99,
            status: statuses[Math.floor(Math.random() * statuses.length)],
            date: new Date(Date.now() - Math.random() * 90 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
        }));
    }

    generateMockAnalytics() {
        const generateDailySeries = () => {
            const data = [];
            let base = 5000;
            for (let i = 30; i >= 0; i--) {
                const date = new Date(Date.now() - i * 24 * 60 * 60 * 1000);
                const value = base + Math.floor(Math.random() * 2000) - 500;
                base = value;
                data.push({
                    date: date.toISOString().split('T')[0],
                    value: Math.max(1000, value),
                });
            }
            return data;
        };

        return {
            revenue: generateDailySeries(),
            users: generateDailySeries().map(d => ({ ...d, value: Math.floor(d.value / 10) })),
            orders: generateDailySeries().map(d => ({ ...d, value: Math.floor(d.value / 100) })),
            conversion: Array.from({ length: 31 }, (_, i) => ({
                date: new Date(Date.now() - (30 - i) * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                value: (Math.random() * 5 + 2).toFixed(2),
            })),
        };
    }
}

const storage = new StorageManager();
    </script>
    <script >
       

class StateManager {
    constructor(initialState = {}) {
        this.state = initialState;
        this.subscribers = [];
        this.middlewares = [];
    }

    subscribe(callback) {
        this.subscribers.push(callback);
        return () => {
            this.subscribers = this.subscribers.filter(cb => cb !== callback);
        };
    }

    use(middleware) {
        this.middlewares.push(middleware);
        return this;
    }

    async dispatch(action) {
        let processedAction = action;

        for (const middleware of this.middlewares) {
            processedAction = await middleware(processedAction, this.state);
        }

        const newState = { ...this.state };
        Object.assign(newState, processedAction.payload);

        this.state = newState;
        this.notify();
    }

    notify() {
        this.subscribers.forEach(callback => {
            callback(this.state);
        });
    }

    getState() {
        return { ...this.state };
    }

    setState(newState) {
        this.state = { ...this.state, ...newState };
        this.notify();
    }
}

const appState = new StateManager({
    currentPage: 'dashboard',
    searchQuery: '',
    sidebarCollapsed: false,
    usersFilters: { role: 'all', status: 'all', search: '' },
    ordersFilters: { status: 'all', search: '' },
    analyticsDateRange: '30d',
    modalOpen: false,
    modalContent: null,
    notifications: [],
});

appState.subscribe(state => {
    console.debug('State updated:', state);
});

class UI {
   
    static renderKPICard(data) {
        const trend = data.trend >= 0 ? 'positive' : 'negative';
        const arrow = data.trend >= 0 ? '↑' : '↓';
        const sparklineHTML = this.renderSparkline(data.sparklineData, data.color || '#3b82f6');

        return `
            <div class="kpi-card ${data.color === '#22c55e' ? 'success' : data.color === '#f59e0b' ? 'warning' : data.color === '#ef4444' ? 'danger' : ''}">
                <div class="kpi-header">
                    <span class="kpi-label">${data.label}</span>
                    <div class="kpi-icon">
                        ${data.icon}
                    </div>
                </div>
                <div class="kpi-value">${data.value}</div>
                <div class="kpi-footer">
                    <span class="kpi-trend ${trend}">
                        <span class="trend-arrow">${arrow}</span>
                        ${Math.abs(data.trend)}% vs last month
                    </span>
                </div>
                <svg class="kpi-sparkline" viewBox="0 0 100 28">${sparklineHTML}</svg>
            </div>
        `;
    }

   
    static renderSparkline(data, color = '#3b82f6') {
        if (!data || data.length < 2) return '';

        const max = Math.max(...data);
        const min = Math.min(...data);
        const range = max - min || 1;
        const points = data.map((value, i) => {
            const x = (i / (data.length - 1)) * 100;
            const y = ((max - value) / range) * 20 + 4;
            return `${x},${y}`;
        }).join(' ');

        return `<polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.6" vector-effect="non-scaling-stroke"/>`;
    }

   
    static renderSkeleton(count = 4, type = 'card') {
        let html = '';
        for (let i = 0; i < count; i++) {
            if (type === 'card') {
                html += '<div class="skeleton skeleton-card"></div>';
            } else if (type === 'row') {
                html += '<div class="skeleton skeleton-row"></div>';
            }
        }
        return html;
    }

   
    static renderTable(columns, data, options = {}) {
        const { sortable = true, filterable = false, paginate = false, itemsPerPage = 10 } = options;

        let html = '<table>';
        
       
        html += '<thead><tr>';
        columns.forEach(col => {
            html += `<th ${sortable ? 'class="sortable"' : ''}>${col.label}</th>`;
        });
        html += '<th>Actions</th></tr></thead>';

       
        html += '<tbody>';
        const paginatedData = paginate ? data.slice(0, itemsPerPage) : data;
        
        paginatedData.forEach(row => {
            html += '<tr>';
            columns.forEach(col => {
                const value = row[col.key];
                if (col.type === 'status') {
                    const statusClass = value.toLowerCase();
                    html += `<td><span class="badge ${statusClass}">${value}</span></td>`;
                } else if (col.type === 'email') {
                    html += `<td><a href="mailto:${value}">${value}</a></td>`;
                } else {
                    html += `<td>${value}</td>`;
                }
            });
            html += `<td><div class="action-buttons">
                <button class="btn-small" data-action="edit">Edit</button>
                <button class="btn-small danger" data-action="delete">Delete</button>
            </div></td>`;
            html += '</tr>';
        });
        html += '</tbody>';

        html += '</table>';
        return html;
    }

   
    static renderEmptyState(title, description) {
        return `
            <div class="empty-state">
                <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M12 7v5m0 3v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <h3 class="empty-state-title">${title}</h3>
                <p class="empty-state-description">${description}</p>
            </div>
        `;
    }

    
    static renderBadge(text, status) {
        return `<span class="badge ${status}">${text}</span>`;
    }

    
    static renderButton(text, onClick, options = {}) {
        const { className = 'btn-primary', disabled = false } = options;
        return `<button class="btn ${className}" ${disabled ? 'disabled' : ''} onclick="${onClick}">${text}</button>`;
    }
}</script>
    <script>
    

class Router {
    constructor() {
        this.routes = {};
        this.currentRoute = null;
        this.setupEventListeners();
    }

    register(path, handler) {
        this.routes[path] = handler;
    }

    setup() {
        this.handleRouteChange();

        window.addEventListener('hashchange', () => this.handleRouteChange());

        this.updatePageTitle();
    }

    handleRouteChange() {
        const hash = window.location.hash.slice(1) || '/';
        const [path, ...params] = hash.split('?');

        if (this.routes[path]) {
            this.currentRoute = path;
            this.routes[path](params);
            this.updatePageTitle(path);
            this.updateActiveNav(path);
        } else {
            this.routes['/']();
        }
    }

    updatePageTitle(path = '/') {
        const titles = {
            '/': 'Dashboard',
            '/analytics': 'Analytics',
            '/users': 'Users',
            '/orders': 'Orders',
            '/settings': 'Settings',
        };

        const title = titles[path] || 'Dashboard';
        document.getElementById('pageTitle').textContent = title;
    }

    updateActiveNav(path) {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
        });

        const activeItem = document.querySelector(`[data-page="${path.slice(1)}"]`);
        if (activeItem) {
            activeItem.classList.add('active');
        }
    }

    navigate(path) {
        window.location.hash = path;
    }

    setupEventListeners() {
        document.addEventListener('click', e => {
            const navItem = e.target.closest('.nav-item');
            if (navItem) {
                e.preventDefault();
                const href = navItem.getAttribute('href');
                if (href) this.navigate(href.slice(1));
            }
        });
    }
}

const router = new Router();
    </script>
    <script >
       

class ChartRenderer {
    static renderLineChart(data, options = {}) {
        const { width = 800, height = 300, strokeWidth = 2, color = '#3b82f6' } = options;
        const padding = 40;
        const plotWidth = width - padding * 2;
        const plotHeight = height - padding * 2;

        const values = data.map(d => d.value);
        const maxValue = Math.max(...values) * 1.1;
        const minValue = Math.min(...values) * 0.9;
        const valueRange = maxValue - minValue || 1;

        const points = data.map((d, i) => {
            const x = padding + (i / (data.length - 1)) * plotWidth;
            const y = height - padding - ((d.value - minValue) / valueRange) * plotHeight;
            return { x, y, value: d.value };
        });

        const pathData = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');

        let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" class="chart-canvas">`;

        for (let i = 0; i <= 5; i++) {
            const y = padding + (i / 5) * plotHeight;
            svg += `<line x1="${padding}" y1="${y}" x2="${width - padding}" y2="${y}" stroke="#334155" stroke-width="0.5" opacity="0.3"/>`;
            const value = Math.round(maxValue - (i / 5) * valueRange);
            svg += `<text x="${padding - 10}" y="${y}" text-anchor="end" dominant-baseline="middle" font-size="12" fill="#94a3b8">${value}</text>`;
        }

        svg += `<path d="${pathData}" stroke="${color}" stroke-width="${strokeWidth}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;

       
        points.forEach((p, i) => {
            svg += `<circle cx="${p.x}" cy="${p.y}" r="3" fill="${color}" opacity="0.8"/>`;
        });

        svg += `<line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="#334155" stroke-width="1"/>`;
        svg += `<line x1="${padding}" y1="${padding}" x2="${padding}" y2="${height - padding}" stroke="#334155" stroke-width="1"/>`;

        const labelInterval = Math.floor(data.length / 5);
        data.forEach((d, i) => {
            if (i % labelInterval === 0 || i === data.length - 1) {
                const point = points[i];
                svg += `<text x="${point.x}" y="${height - padding + 20}" text-anchor="middle" font-size="12" fill="#94a3b8">${d.date.substring(5)}</text>`;
            }
        });

        svg += '</svg>';
        return svg;
    }

    static renderBarChart(data, options = {}) {
        const { width = 800, height = 300, color = '#3b82f6' } = options;
        const padding = 40;
        const plotWidth = width - padding * 2;
        const plotHeight = height - padding * 2;

        const values = data.map(d => d.value);
        const maxValue = Math.max(...values) * 1.1;
        const barWidth = plotWidth / data.length * 0.7;
        const barGap = plotWidth / data.length * 0.3;

        let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" class="chart-canvas">`;

        for (let i = 0; i <= 5; i++) {
            const y = height - padding - (i / 5) * plotHeight;
            svg += `<line x1="${padding}" y1="${y}" x2="${width - padding}" y2="${y}" stroke="#334155" stroke-width="0.5" opacity="0.3"/>`;
            const value = Math.round((i / 5) * maxValue);
            svg += `<text x="${padding - 10}" y="${y}" text-anchor="end" dominant-baseline="middle" font-size="12" fill="#94a3b8">${value}</text>`;
        }

        data.forEach((d, i) => {
            const barHeight = (d.value / maxValue) * plotHeight;
            const x = padding + (i * (barWidth + barGap)) + barGap / 2;
            const y = height - padding - barHeight;

            svg += `<rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" fill="${color}" rx="4" opacity="0.8">`;
            svg += `<title>${d.label}: ${d.value}</title>`;
            svg += `</rect>`;
        });

        svg += `<line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="#334155" stroke-width="1"/>`;
        svg += `<line x1="${padding}" y1="${padding}" x2="${padding}" y2="${height - padding}" stroke="#334155" stroke-width="1"/>`;

        data.forEach((d, i) => {
            const barHeight = (d.value / maxValue) * plotHeight;
            const x = padding + (i * (barWidth + barGap)) + barGap / 2 + barWidth / 2;
            const y = height - padding + 20;

            svg += `<text x="${x}" y="${y}" text-anchor="middle" font-size="12" fill="#94a3b8">${d.label.substring(5)}</text>`;
        });

        svg += '</svg>';
        return svg;
    }
}

    <script >
       

class API {
    constructor(delayRange = [100, 500]) {
        this.delayRange = delayRange;
    }

   
    async delay() {
        const [min, max] = this.delayRange;
        const delay = Math.random() * (max - min) + min;
        return new Promise(resolve => setTimeout(resolve, delay));
    }

    
    async getDashboardKPIs() {
        await this.delay();

        const analytics = storage.get('analytics');
        const currentMonthRevenue = analytics.revenue.slice(-30).reduce((sum, d) => sum + d.value, 0);
        const lastMonthRevenue = analytics.revenue.slice(-60, -30).reduce((sum, d) => sum + d.value, 0);
        const revenueTrend = Math.round(((currentMonthRevenue - lastMonthRevenue) / lastMonthRevenue) * 100);

        const users = storage.get('users');
        const activeUsers = users.filter(u => u.status === 'Active').length;
        const lastMonthActiveUsers = Math.round(activeUsers * 0.92);
        const usersTrend = Math.round(((activeUsers - lastMonthActiveUsers) / lastMonthActiveUsers) * 100);

        const orders = storage.get('orders');
        const completedOrders = orders.filter(o => o.status === 'Completed').length;
        const lastMonthCompletedOrders = Math.round(completedOrders * 0.88);
        const ordersTrend = Math.round(((completedOrders - lastMonthCompletedOrders) / lastMonthCompletedOrders) * 100);

        const conversion = (completedOrders / orders.length * 100).toFixed(2);
        const lastMonthConversion = (Math.random() * 10 + 8).toFixed(2);
        const conversionTrend = Math.round(((conversion - lastMonthConversion) / lastMonthConversion) * 100);

        return {
            revenue: {
                value: `$${(currentMonthRevenue / 1000).toFixed(1)}K`,
                trend: revenueTrend,
                sparklineData: analytics.revenue.slice(-14).map(d => d.value),
            },
            users: {
                value: activeUsers,
                trend: usersTrend,
                sparklineData: analytics.users.slice(-14).map(d => d.value),
            },
            orders: {
                value: completedOrders,
                trend: ordersTrend,
                sparklineData: analytics.orders.slice(-14).map(d => d.value),
            },
            conversion: {
                value: `${conversion}%`,
                trend: conversionTrend,
                sparklineData: analytics.conversion.slice(-14).map(d => parseFloat(d.value)),
            },
        };
    }

   
    async getAnalytics(dateRange = '30d') {
        await this.delay();
        return storage.get('analytics');
    }

    
    async getUsers(filters = {}) {
        await this.delay();

        let users = storage.get('users');

        if (filters.role && filters.role !== 'all') {
            users = users.filter(u => u.role === filters.role);
        }

        if (filters.status && filters.status !== 'all') {
            users = users.filter(u => u.status === filters.status);
        }

        if (filters.search) {
            const query = filters.search.toLowerCase();
            users = users.filter(u =>
                u.name.toLowerCase().includes(query) ||
                u.email.toLowerCase().includes(query)
            );
        }

        return users;
    }

   
    async getOrders(filters = {}) {
        await this.delay();

        let orders = storage.get('orders');

        if (filters.status && filters.status !== 'all') {
            orders = orders.filter(o => o.status === filters.status);
        }

        if (filters.search) {
            const query = filters.search.toLowerCase();
            orders = orders.filter(o =>
                o.customer.toLowerCase().includes(query) ||
                o.email.toLowerCase().includes(query) ||
                o.id.toLowerCase().includes(query)
            );
        }

        return orders;
    }

 
    async createUser(userData) {
        await this.delay();

        const users = storage.get('users');
        const newUser = {
            id: `usr_${String(users.length + 1).padStart(4, '0')}`,
            ...userData,
            status: 'Active',
            joinedAt: new Date().toISOString().split('T')[0],
            lastActive: new Date().toISOString().split('T')[0],
        };

        users.push(newUser);
        storage.set('users', users);

        return newUser;
    }

   
    async updateUser(userId, updates) {
        await this.delay();

        const users = storage.get('users');
        const index = users.findIndex(u => u.id === userId);

        if (index === -1) throw new Error('User not found');

        users[index] = { ...users[index], ...updates };
        storage.set('users', users);

        return users[index];
    }

   
    async deleteUser(userId) {
        await this.delay();

        let users = storage.get('users');
        users = users.filter(u => u.id !== userId);
        storage.set('users', users);

        return true;
    }

    async simulateError() {
        await this.delay();
        throw new Error('Network error: Please try again');
    }
}

const api = new API();
    </script>

    static async renderAnalytics() {
        const pageContent = document.getElementById('pageContent');

        try {
            const analytics = await api.getAnalytics();

            let html = `
                <div style="margin-bottom: var(--space-2xl);">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-lg); margin-bottom: var(--space-2xl);">
                        ${['Revenue', 'Users', 'Orders', 'Conversion'].map((metric, i) => {
                            const values = [
                                { current: 127500, previous: 110000 },
                                { current: 3240, previous: 3050 },
                                { current: 1245, previous: 1100 },
                                { current: 3.8, previous: 3.2 },
                            ];
                            const val = values[i];
                            const change = Math.round(((val.current - val.previous) / val.previous) * 100);
                            return `
                                <div class="kpi-card">
                                    <div class="kpi-label">${metric}</div>
                                    <div class="kpi-value">${metric === 'Revenue' ? '$' : ''}${val.current}${metric === 'Conversion' ? '%' : ''}</div>
                                    <div class="kpi-trend ${change >= 0 ? 'positive' : 'negative'}">
                                        <span class="trend-arrow">${change >= 0 ? '↑' : '↓'}</span>
                                        ${Math.abs(change)}% vs last month

                                </div>
                            `;

                <div style="margin-bottom: var(--space-2xl);">
                    <div class="chart-container">

                            <div class="chart-controls">
                                <button class="chart-period-btn active" data-period="30d">30D</button>
                                <button class="chart-period-btn" data-period="90d">90D</button>

                <div style="margin-bottom: var(--space-2xl);">
                    <div class="chart-container">

    static attachChartControls() {
        document.querySelectorAll('.chart-period-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.chart-period-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                showToast(`Period changed to ${e.target.textContent}`, 'info');
            });
        });
    }

    static attachUserListeners() {
        document.getElementById('userSearch')?.addEventListener('input', async (e) => {
            const search = e.target.value;
            const users = await api.getUsers({ search });
            console.log('Filtered users:', users);
        });

        document.getElementById('addUserBtn')?.addEventListener('click', () => {
            showModal('Add New User', `
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-input" id="newUserName" placeholder="Full name">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="newUserEmail" placeholder="Email address">
                </div>
                <div class="form-group">

                    <select class="filter-select" id="newUserRole" style="width: 100%;">
                        <option value="User">User</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
            `, [
                { text: 'Create User', onClick: () => handleCreateUser() },
                { text: 'Cancel', onClick: () => closeModal() },
            ]);
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const userId = e.target.dataset.userId;
                if (confirm('Are you sure you want to delete this user?')) {
                    await api.deleteUser(userId);
                    showToast('User deleted successfully', 'success');
                    PageRenderer.renderUsers();
                }
            });
        });
    }

    static attachOrderListeners() {
        document.querySelectorAll('.view-order').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const orderId = e.target.dataset.orderId;
                showToast(`Opening order ${orderId}`, 'info');
            });
        });
    }

    static attachSettingsListeners() {
        document.getElementById('saveSettingsBtn')?.addEventListener('click', () => {
            const settings = storage.get('settings');
            settings.theme = document.getElementById('themeSelect').value;
            settings.currency = document.getElementById('currencySelect').value;
            settings.notifications = document.getElementById('notificationToggle').checked;
            storage.set('settings', settings);
            showToast('Settings saved successfully', 'success');
        });

        document.getElementById('resetDataBtn')?.addEventListener('click', () => {
            if (confirm('This will reset all data to default. Are you sure?')) {
                storage.clear();
                showToast('All data has been reset', 'success');
                router.navigate('/');
            }
        });
    }
}


function showModal(title, content, buttons = []) {
    const overlay = document.getElementById('modalOverlay');
    overlay.innerHTML = `
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">${title}</h2>
                <button class="modal-close" onclick="closeModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                ${content}
            </div>
            <div class="modal-footer">
                ${buttons.map(btn => `
                    <button class="btn ${btn.type === 'danger' ? 'btn-danger' : 'btn-primary'}" onclick="${btn.onClick}">
                        ${btn.text}
                    </button>
                `).join('')}
            </div>
        </div>
    `;
    overlay.classList.add('visible');
}

function closeModal() {
    const overlay = document.getElementById('modalOverlay');
    overlay.classList.remove('visible');
    overlay.innerHTML = '';
}

function showToast(message, type = 'info', duration = 4000) {
    const container = document.getElementById('toastContainer');
    const id = `toast_${Date.now()}`;

    const icons = {
        success: `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`,
        error: `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>`,
        warning: `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>`,
        info: `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`,
    };

    const toast = document.createElement('div');
    toast.id = id;
    toast.className = `toast ${type}`;
    toast.innerHTML = `
        <div class="toast-icon">${icons[type]}</div>
        <div class="toast-content">
            <div class="toast-title">${type.charAt(0).toUpperCase() + type.slice(1)}</div>
            <div class="toast-message">${message}</div>
        </div>
    `;

    container.appendChild(toast);

    setTimeout(() => {
        toast.classList.add('removing');
        setTimeout(() => {
            toast.remove();
        }, 300);
    }, duration);
}

document.getElementById('sidebarToggle')?.addEventListener('click', () => {
    const sidebar = document.getElementById('sidebar');
    const wrapper = document.querySelector('.main-wrapper');
    sidebar.classList.toggle('expanded');
    wrapper.classList.toggle('sidebar-collapsed');
});

document.getElementById('profileBtn')?.addEventListener('click', () => {
    const menu = document.getElementById('dropdownMenu');
    menu.classList.toggle('visible');
});

document.addEventListener('click', (e) => {
    const profileDropdown = document.querySelector('.profile-dropdown');
    if (!profileDropdown?.contains(e.target)) {
        document.getElementById('dropdownMenu')?.classList.remove('visible');
    }
});

document.getElementById('modalOverlay')?.addEventListener('click', (e) => {
    if (e.target.id === 'modalOverlay') {
        closeModal();
    }
});



function initializeApp() {
    router.register('/', () => PageRenderer.renderDashboard());
    router.register('/dashboard', () => PageRenderer.renderDashboard());
    router.register('/analytics', () => PageRenderer.renderAnalytics());
    router.register('/users', () => PageRenderer.renderUsers());
    router.register('/orders', () => PageRenderer.renderOrders());
    router.register('/settings', () => PageRenderer.renderSettings());

    router.setup();

    setTimeout(() => {
        showToast('Welcome back! Your dashboard is ready.', 'success');
    }, 1000);
}


if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initializeApp);
} else {
    initializeApp();
}
